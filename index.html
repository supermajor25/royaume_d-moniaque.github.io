<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rituel 3D</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////
// LUMIÈRES
//////////////////////////////////////////////////////

const light = new THREE.PointLight(0xff4500,3,20);
light.position.set(0,2,3);
scene.add(light);

const ambient = new THREE.AmbientLight(0x220000);
scene.add(ambient);

//////////////////////////////////////////////////////
// PORTAIL
//////////////////////////////////////////////////////

const portalGeometry = new THREE.TorusGeometry(2,0.3,32,100);
const portalMaterial = new THREE.MeshStandardMaterial({
color:0xff4500,
emissive:0xff2200,
emissiveIntensity:2
});

const portal = new THREE.Mesh(portalGeometry,portalMaterial);
scene.add(portal);

//////////////////////////////////////////////////////
// LIVRE
//////////////////////////////////////////////////////

const bookGeometry = new THREE.BoxGeometry(2,0.3,3);

const bookMaterial = new THREE.MeshStandardMaterial({
color:0x3b2414
});

const book = new THREE.Mesh(bookGeometry,bookMaterial);
book.position.set(-2,-1,0);
scene.add(book);

//////////////////////////////////////////////////////
// RUNES
//////////////////////////////////////////////////////

const runeGeometry = new THREE.SphereGeometry(0.1,16,16);
const runeMaterial = new THREE.MeshBasicMaterial({color:0xffaa00});

const runes = [];

for(let i=0;i<12;i++){

const rune = new THREE.Mesh(runeGeometry,runeMaterial);

const angle = i/12*Math.PI*2;

rune.position.set(
Math.cos(angle)*3,
Math.sin(angle)*3,
0
);

scene.add(rune);
runes.push(rune);

}

//////////////////////////////////////////////////////
// ANIMATION
//////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

portal.rotation.z += 0.01;

runes.forEach((rune,i)=>{

const t = Date.now()*0.001+i;

rune.position.x = Math.cos(t)*3;
rune.position.y = Math.sin(t)*3;

});

renderer.render(scene,camera);

}

animate();

//////////////////////////////////////////////////////

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
